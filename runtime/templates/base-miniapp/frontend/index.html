<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Telegram Mini App Template</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=photo_camera"
    />
    <style>
      html,
      body {
        margin: 0;
        background: #fff;
      }

      #startup-loader {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: #fff;
        opacity: 1;
        transform: scale(1);
        transition: opacity 0.14s ease, transform 0.14s ease;
      }

      #startup-loader.startup-loader--hide {
        opacity: 0;
        transform: scale(1.04);
        pointer-events: none;
      }

      #startup-loader .startup-logo {
        position: relative;
        width: clamp(138px, 32vw, 205px);
        height: auto;
        z-index: 1;
      }

      #startup-loader .startup-background {
        position: absolute;
        width: 300%;
        height: 300%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(1);
        transform-origin: center;
        background: radial-gradient(circle, #060f30 0%, rgba(6, 15, 48, 0) 100%);
        opacity: 0.98;
        z-index: 0;
      }

      #startup-loader .startup-logo-base {
        fill: none;
        stroke: #f2f2f2;
        opacity: 0.28;
      }

      #startup-loader .startup-logo-path {
        fill: none;
        stroke: #f2f2f2;
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        animation: startupDraw 1.5s ease-out forwards;
      }

      @keyframes startupDraw {
        0% {
          stroke-dashoffset: 1000;
        }
        100% {
          stroke-dashoffset: 0;
        }
      }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      (function initTelegramWebAppEarly() {
        var tg = window.Telegram && window.Telegram.WebApp;
        if (!tg) return;

        var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
          navigator.userAgent || ''
        );

        try {
          if (typeof tg.ready === 'function') tg.ready();
          if (typeof tg.expand === 'function') tg.expand();
          if (typeof tg.disableVerticalSwipes === 'function') tg.disableVerticalSwipes();

          if (isMobile && typeof tg.requestFullscreen === 'function') {
            var result = tg.requestFullscreen();
            if (result && typeof result.catch === 'function') {
              result.catch(function () {
                if (typeof tg.expand === 'function') tg.expand();
              });
            }
          }
        } catch (_) {
          if (typeof tg.expand === 'function') tg.expand();
        }
      })();
    </script>
  </head>
  <body>
    <div id="startup-loader" aria-hidden="true">
      <div class="startup-background"></div>
      <svg class="startup-logo" xmlns="http://www.w3.org/2000/svg" width="100" height="70" viewBox="0 0 54 38">
        <path
          class="startup-logo-base"
          d="M53.5 9.7A11 11 0 0 0 50.1 3 10.3 10.3 0 0 0 42.8.5c-3 0-5.5.7-8 2.2A17.3 17.3 0 0 0 29 9.2V1.1h-4.5l.1 22.3c-.9 2.9-2.6 5.3-4.7 7a10.8 10.8 0 0 1-7.2 2.9c-2.7 0-4.7-1-6-3-1.3-2-2-5-2-9.2V1H.2v21.8s0 3.3.4 5.4A11 11 0 0 0 3.9 35c1.8 1.7 4.2 2.6 7.2 2.6s5.6-.8 8-2.3a17 17 0 0 0 5.6-6V37h4.7V15A15 15 0 0 1 34 7.5c2.2-1.8 4.6-2.8 7.3-2.8s4.7 1 6 3c1.2 1.9 1.9 5 1.9 9.2v20h4.7V15s0-3.2-.4-5.3Z"
        />
        <path
          class="startup-logo-path"
          d="M53.5 9.7A11 11 0 0 0 50.1 3 10.3 10.3 0 0 0 42.8.5c-3 0-5.5.7-8 2.2A17.3 17.3 0 0 0 29 9.2V1.1h-4.5l.1 22.3c-.9 2.9-2.6 5.3-4.7 7a10.8 10.8 0 0 1-7.2 2.9c-2.7 0-4.7-1-6-3-1.3-2-2-5-2-9.2V1H.2v21.8s0 3.3.4 5.4A11 11 0 0 0 3.9 35c1.8 1.7 4.2 2.6 7.2 2.6s5.6-.8 8-2.3a17 17 0 0 0 5.6-6V37h4.7V15A15 15 0 0 1 34 7.5c2.2-1.8 4.6-2.8 7.3-2.8s4.7 1 6 3c1.2 1.9 1.9 5 1.9 9.2v20h4.7V15s0-3.2-.4-5.3Z"
        />
      </svg>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
