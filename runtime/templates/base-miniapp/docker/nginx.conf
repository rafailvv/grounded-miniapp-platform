server {
  listen 80;
  server_name _;

  location /api/ {
    proxy_pass http://preview-backend:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /health {
    proxy_pass http://preview-backend:8000/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location ~ ^/(builds|repo|sandbox|telemetry)/ {
    proxy_pass http://preview-backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://preview-frontend:80/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}
