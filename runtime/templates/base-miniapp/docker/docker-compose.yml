services:
  preview-backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../backend:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn app.main:app --host ${UVICORN_HOST:-0.0.0.0} --port ${UVICORN_PORT:-8000}"
    environment:
      DATABASE_URL: postgresql+psycopg://miniapp:miniapp@preview-db:5432/miniapp
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 12
    depends_on:
      preview-db:
        condition: service_started

  preview-frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: >
      sh -c "export VITE_API_BASE_URL=${PREVIEW_API_BASE_URL:-} &&
             export VITE_DEFAULT_ROLE=${PREVIEW_DEFAULT_ROLE:-client} &&
             npm ci &&
             npm run build &&
             npm run preview -- --host 0.0.0.0 --port 4173"
    expose:
      - "4173"
    depends_on:
      preview-backend:
        condition: service_healthy

  preview-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PREVIEW_POSTGRES_DB:-miniapp}
      POSTGRES_USER: ${PREVIEW_POSTGRES_USER:-miniapp}
      POSTGRES_PASSWORD: ${PREVIEW_POSTGRES_PASSWORD:-miniapp}
    volumes:
      - preview-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PREVIEW_POSTGRES_USER:-miniapp} -d ${PREVIEW_POSTGRES_DB:-miniapp}"]
      interval: 10s
      timeout: 5s
      retries: 10

  preview-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${PREVIEW_PROXY_PORT:-18080}:80"
    depends_on:
      preview-backend:
        condition: service_healthy
      preview-frontend:
        condition: service_started

volumes:
  preview-db-data:
