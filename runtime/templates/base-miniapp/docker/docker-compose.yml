services:
  preview-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 12
    depends_on:
      preview-db:
        condition: service_started

  preview-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_ENDPOINT: ${PREVIEW_AUTH_ENDPOINT:-/api/auth/telegram}
        VITE_API_BASE_URL: ${PREVIEW_API_BASE_URL:-}
        VITE_DEFAULT_ROLE: ${PREVIEW_DEFAULT_ROLE:-client}
    expose:
      - "80"
    depends_on:
      preview-backend:
        condition: service_healthy

  preview-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PREVIEW_POSTGRES_DB:-miniapp}
      POSTGRES_USER: ${PREVIEW_POSTGRES_USER:-miniapp}
      POSTGRES_PASSWORD: ${PREVIEW_POSTGRES_PASSWORD:-miniapp}
    volumes:
      - preview-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PREVIEW_POSTGRES_USER:-miniapp} -d ${PREVIEW_POSTGRES_DB:-miniapp}"]
      interval: 10s
      timeout: 5s
      retries: 10

  preview-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PREVIEW_PROXY_PORT:-18080}:80"
    depends_on:
      preview-backend:
        condition: service_healthy
      preview-frontend:
        condition: service_started

volumes:
  preview-db-data:
