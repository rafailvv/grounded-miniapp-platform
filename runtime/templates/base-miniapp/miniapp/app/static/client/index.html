<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client</title>
    <link rel="stylesheet" href="/static/client/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="page">
        <a class="card-link" href="/client/profile" aria-label="Open client profile">
          <article class="card">
            <div class="avatar-wrap" id="profile-avatar"></div>
            <div class="info">
              <span class="caption">Personal workspace</span>
              <strong class="name" id="profile-name"></strong>
              <span class="role">Client</span>
            </div>
            <span class="chevron" aria-hidden="true">›</span>
          </article>
        </a>

        <section class="feature-block">
          <div class="feature-content">
            <span class="feature-title">Client workspace</span>
          </div>
        </section>
      </section>
    </main>
    <script src="/static/preview-bridge.js" defer></script>
    <script src="/static/client/app.js" defer></script>
  </body>
  </html>
